name: Temporary industrial method qualification validation

on:
  push:
    branches:
      - "codex/industrial-method-qualification"
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Apply and verify Spotless
        run: |
          ./mvnw spotless:apply
          ./mvnw spotless:check
          git diff --binary -- src/main/java src/test/java > spotless.patch
      - name: Run focused qualification tests
        run: ./mvnw -Dtest='EngineeringMethodQualificationRegistryTest,EngineeringProductionReadinessTest' test
      - name: Check patch whitespace
        run: git diff --check
      - name: Upload Spotless patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: industrial-method-qualification-spotless
          path: spotless.patch
          if-no-files-found: warn
          retention-days: 1
