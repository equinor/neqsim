name: Codex Spotless patch export

on:
  push:
    branches:
      - codex/sif-reliability-degraded
  pull_request:
    branches:
      - codex/closed-loop-sif-execution

permissions:
  contents: read

jobs:
  export-spotless-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Apply Spotless
        run: ./mvnw -q spotless:apply
      - name: Export patch
        run: git diff --binary > /tmp/spotless.patch
      - uses: actions/upload-artifact@v4
        with:
          name: spotless-patch
          path: /tmp/spotless.patch
          if-no-files-found: error
