name: Codex stacked PR validation

on:
  pull_request:
    branches:
      - codex/closed-loop-sif-execution

permissions:
  contents: read

jobs:
  focused-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Spotless check
        run: ./mvnw -q spotless:check
      - name: Focused tests
        run: ./mvnw -q -Dtest='SafetyFunctionReliabilityStudyTest,SafetyFunctionDegradedModeAssessmentTest' test
