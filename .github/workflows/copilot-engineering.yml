name: Copilot solve engineering task

# Triggers when an issue is labeled 'copilot-engineering'.
# Assigns Copilot coding agent with instructions to:
#   1. Build NeqSim from source (Maven)
#   2. Set up Python with neqsim-python
#   3. Create task folder, notebooks, and run simulations
#   4. Commit results and open a PR
#
# The coding agent runs in a Codespace with terminal access,
# so it CAN build Java, run Python, and execute notebooks.
#
# Prerequisites:
#   - GitHub Copilot Business or Enterprise plan
#   - Copilot coding agent enabled in repo settings

permissions:
  issues: write
  pull-requests: write

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # Job 1: Initial assignment when label is added
  assign-copilot-engineering:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'copilot-engineering'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot to the engineering task
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const currentAssignees = issue.assignees.map(a => a.login);

            if (currentAssignees.includes('copilot')) {
              console.log('Copilot is already assigned to this issue.');
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: ['copilot']
            });

            console.log(`Assigned Copilot to engineering task #${issue.number}: ${issue.title}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '🔬 **Copilot coding agent** has been assigned to this engineering task.',
                '',
                'Copilot will follow the engineering task workflow:',
                '1. Build NeqSim from source (`./mvnw package -DskipTests`)',
                '2. Install dev tools (`pip install -e devtools/ matplotlib jupyter`)',
                '3. Create Jupyter notebook with NeqSim simulations',
                '4. Write/update JUnit tests for any new Java code',
                '5. Run simulations and collect results',
                '6. Commit reusable outputs (notebooks, tests, docs) and open a PR',
                '',
                '**Iteration:** To request changes after the PR is opened:',
                '- Comment on the **PR** with review feedback → Copilot updates automatically',
                '- Comment on this **issue** starting with `@copilot` → triggers re-evaluation',
                '',
                '> **Note:** Engineering results are AI-assisted preliminary estimates.',
                '> All outputs require review by a qualified engineer before use in',
                '> design decisions or safety-critical applications.'
              ].join('\n')
            });

  # Job 2: Iterate when someone comments @copilot on a copilot-engineering issue
  iterate-on-engineering-feedback:
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@copilot') &&
      github.event.comment.user.login != 'copilot[bot]' &&
      github.event.comment.user.login != 'copilot' &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check issue has copilot-engineering label and re-assign
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            if (!labels.includes('copilot-engineering')) {
              console.log('Issue does not have copilot-engineering label. Skipping.');
              return;
            }

            const issue = context.payload.issue;
            const assignees = issue.assignees.map(a => a.login);

            if (!assignees.includes('copilot')) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: ['copilot']
              });
              console.log(`Re-assigned Copilot to issue #${issue.number} for iteration.`);
            } else {
              console.log(`Copilot already assigned to #${issue.number}. It will pick up the new feedback.`);
            }
