name: Copilot solve and iterate

# Triggers:
#   1. Issue labeled 'copilot-solve' → assigns Copilot to solve it
#   2. Comment on issue with 'copilot-solve' label → Copilot iterates on feedback
#   3. PR review comment mentioning @copilot → Copilot updates the PR
#
# Copilot coding agent natively picks up PR review comments on PRs it opened.
# This workflow adds support for issue-level feedback and initial assignment.
#
# Prerequisites:
#   - GitHub Copilot Business or Enterprise plan
#   - Copilot coding agent enabled in repo settings
#     (Settings > Copilot > Coding agent > Enable)

permissions:
  issues: write
  pull-requests: write

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # Job 1: Initial assignment when label is added
  assign-copilot:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'copilot-solve'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot to the issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const currentAssignees = issue.assignees.map(a => a.login);

            // Don't re-assign if Copilot is already assigned
            if (currentAssignees.includes('copilot')) {
              console.log('Copilot is already assigned to this issue.');
              return;
            }

            // Assign Copilot coding agent
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: ['copilot']
            });

            console.log(`Assigned Copilot to issue #${issue.number}: ${issue.title}`);

            // Add a comment so the team knows Copilot is working on it
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '🤖 **Copilot coding agent** has been assigned to this issue.',
                '',
                'Copilot will analyze the issue, implement a solution, and open a PR.',
                'It will follow the repo instructions in `.github/copilot-instructions.md`.',
                '',
                '**Iteration:** To request changes after the PR is opened:',
                '- Comment on the **PR** with review feedback → Copilot updates automatically',
                '- Comment on this **issue** starting with `@copilot` → triggers a re-evaluation',
                '',
                '> **Note:** All code changes require human review before merging.',
                '> Copilot-generated PRs must pass CI (build, tests, javadoc) and',
                '> be approved by a maintainer.'
              ].join('\n')
            });

  # Job 2: Re-assign Copilot when someone comments on a copilot-solve issue
  iterate-on-feedback:
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@copilot') &&
      github.event.comment.user.login != 'copilot[bot]' &&
      github.event.comment.user.login != 'copilot' &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check issue has copilot-solve label
        id: check-label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            if (!labels.includes('copilot-solve')) {
              console.log('Issue does not have copilot-solve label. Skipping.');
              return;
            }

            const issue = context.payload.issue;
            const assignees = issue.assignees.map(a => a.login);

            // Re-assign Copilot if not currently assigned (triggers re-evaluation)
            if (!assignees.includes('copilot')) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: ['copilot']
              });
              console.log(`Re-assigned Copilot to issue #${issue.number} for iteration.`);
            } else {
              // Copilot is already assigned — it will see the new comment
              // and incorporate feedback in its next update
              console.log(`Copilot already assigned to #${issue.number}. It will pick up the new feedback.`);
            }
