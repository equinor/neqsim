name: Prebuild Dev Container

# Builds the NeqSim development container (.devcontainer/) — Java 21 + Maven +
# Python/Jupyter + Node + Copilot extensions — and pushes it to GitHub Container
# Registry so contributors pull a prebuilt image instead of building locally.
#
# Consume it: VS Code "Dev Containers: Reopen in Container" automatically reuses
# the pushed layers via the `cacheFrom` entry in .devcontainer/devcontainer.json.

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - '.devcontainer/**'
      - '.github/workflows/devcontainer_prebuild.yml'
  schedule:
    # Weekly rebuild so the base image picks up OS / security updates.
    - cron: '0 3 * * 1'

jobs:
  build_and_push:
    name: Build & push dev container image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev container image
        uses: devcontainers/ci@v0.3
        with:
          # Lowercase image name required by the registry.
          imageName: ghcr.io/equinor/neqsim-devcontainer
          cacheFrom: ghcr.io/equinor/neqsim-devcontainer
          imageTag: latest
          # Only push on master/main or manual dispatch; PR validation builds
          # the image but does not publish it.
          push: ${{ (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && 'always' || 'never' }}
