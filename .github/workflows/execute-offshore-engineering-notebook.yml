name: Execute complete offshore engineering notebook

on:
  pull_request:
    paths:
      - "examples/notebooks/complete_offshore_process_engineering_study.ipynb"
      - "devtools/test_complete_offshore_engineering_study.py"
      - "src/main/java/neqsim/process/engineering/**"
      - "src/test/java/neqsim/process/engineering/**"
      - ".github/workflows/execute-offshore-engineering-notebook.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build NeqSim workspace classes
        run: ./mvnw -Dmaven.test.skip=true package

      - name: Install notebook runtime
        run: python -m pip install --upgrade nbconvert nbclient nbformat ipykernel pandas matplotlib numpy jpype1 pydexpi==1.2.0 cairosvg==2.9.0

      - name: Execute complete engineering study
        env:
          MPLBACKEND: Agg
          NEQSIM_PROJECT_ROOT: ${{ github.workspace }}
        run: |
          mkdir -p build/executed-notebooks
          python -m jupyter nbconvert \
            --to notebook \
            --execute examples/notebooks/complete_offshore_process_engineering_study.ipynb \
            --ExecutePreprocessor.timeout=3600 \
            --ExecutePreprocessor.kernel_name=python3 \
            --output complete_offshore_process_engineering_study.ipynb \
            --output-dir build/executed-notebooks

      - name: Verify executed outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("build/executed-notebooks/complete_offshore_process_engineering_study.ipynb")
          notebook = json.loads(path.read_text(encoding="utf-8"))
          code_cells = [cell for cell in notebook["cells"] if cell["cell_type"] == "code"]
          assert code_cells
          assert all(cell.get("execution_count") is not None for cell in code_cells)
          assert not any(
              output.get("output_type") == "error"
              for cell in code_cells
              for output in cell.get("outputs", [])
          )
          assert sum(bool(cell.get("outputs")) for cell in code_cells) >= 10
          package = Path("build/complete-offshore-process-engineering-study/revision-b")
          report = json.loads((package / "pydexpi-render-report.json").read_text(encoding="utf-8"))
          assert report["status"] == "IMPORT_AND_RENDER_PASSED"
          for name in (
              "neqsim-model-package.json",
              "plant.dexpi.xml",
              "plant-proteus.xml",
              "plant-pydexpi.xml",
              "engineering-dexpi-roundtrip-report.json",
              "model-change-event.json",
              "model-change-events.jsonl",
              "impact-analysis.json",
              "pydexpi-render-report.json",
              "offshore-process-revision-b-pydexpi.svg",
              "offshore-process-revision-b-pydexpi-panel-1.svg",
              "offshore-process-revision-b-pydexpi-panel-1.png",
              "offshore-process-revision-b-pydexpi-panel-2.svg",
              "offshore-process-revision-b-pydexpi-panel-2.png",
              "offshore-process-revision-b-pydexpi-panel-3.svg",
              "offshore-process-revision-b-pydexpi-panel-3.png",
              "offshore-process-revision-b-pydexpi-panel-4.svg",
              "offshore-process-revision-b-pydexpi-panel-4.png",
          ):
              assert (package / name).is_file(), name

          safety_package = package / "ncs-hazop-safety-study"
          safety_artifacts = (
              "closed-loop-sif-result.json",
              "sif-reliability-uncertainty.json",
              "sif-degraded-mode-assessment.json",
              "hazop-lopa-srs-handoff.json",
              "coupled-relief-blowdown-flare.json",
              "facility-safety-response.json",
              "safety-revalidation-plan.json",
              "safety-benchmark-report.json",
          )
          assert all((safety_package / name).is_file() for name in safety_artifacts)

          def safety_json(name):
              return json.loads((safety_package / name).read_text(encoding="utf-8"))

          closed_loop = safety_json("closed-loop-sif-result.json")
          assert closed_loop["schemaVersion"] == "dynamic_safety_scenario_result.v2"
          assert closed_loop["passed"] is True
          assert len(closed_loop["logicEvidence"]) == 1
          logic_evidence = next(iter(closed_loop["logicEvidence"].values()))
          assert logic_evidence["schemaVersion"] == "closed_loop_sif_evidence.v1"
          assert len(logic_evidence["channelConfiguration"]) == 3

          reliability = safety_json("sif-reliability-uncertainty.json")
          assert reliability["schemaVersion"] == "sif_reliability_uncertainty.v1"
          assert reliability["p10PfdAverage"] <= reliability["p50PfdAverage"] <= reliability["p90PfdAverage"]

          degraded = safety_json("sif-degraded-mode-assessment.json")
          assert degraded["demandCapable"] is True
          assert degraded["targetSilClaimPreserved"] is False

          lifecycle = safety_json("hazop-lopa-srs-handoff.json")
          assert lifecycle["srsDraftCreated"] is True
          assert lifecycle["fitForConstruction"] is False

          coupled = safety_json("coupled-relief-blowdown-flare.json")
          assert coupled["capacityAcceptable"] is True

          facility = safety_json("facility-safety-response.json")
          assert facility["readyForEngineeringReview"] is True
          assert facility["engineeringApprovalRequired"] is True

          revalidation = safety_json("safety-revalidation-plan.json")
          assert len(revalidation["tasks"]) == 7
          assert revalidation["fitForConstruction"] is False

          benchmarks = safety_json("safety-benchmark-report.json")
          assert benchmarks["passed"] is False
          assert len(benchmarks["missingQualifyingMethods"]) == 3
          print(f"Verified {len(code_cells)} executed code cells")
          PY

      - name: Upload executed notebook
        uses: actions/upload-artifact@v7
        with:
          name: complete-offshore-engineering-study-executed
          path: build/executed-notebooks/complete_offshore_process_engineering_study.ipynb
          if-no-files-found: error
          retention-days: 14

      - name: Upload governed revision packages
        uses: actions/upload-artifact@v7
        with:
          name: complete-offshore-engineering-study-model-packages
          path: build/complete-offshore-process-engineering-study
          if-no-files-found: error
          retention-days: 14
