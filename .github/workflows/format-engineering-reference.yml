name: Format engineering reference fixture

on:
  pull_request:
    paths:
      - "src/main/java/neqsim/process/engineering/verticalslice/InletCompressionExportReferenceFacility.java"
      - "src/test/java/neqsim/process/engineering/QualifiedEngineeringReferenceFacilityTest.java"
      - ".github/workflows/format-engineering-reference.yml"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Apply Spotless
        run: ./mvnw spotless:apply
      - uses: actions/upload-artifact@v6
        with:
          name: formatted-engineering-reference
          path: |
            src/main/java/neqsim/process/engineering/verticalslice/InletCompressionExportReferenceFacility.java
            src/test/java/neqsim/process/engineering/QualifiedEngineeringReferenceFacilityTest.java
