name: LNG source formatting

on:
  pull_request:
    paths:
      - 'src/main/java/neqsim/process/lng/LNGProcessBuilder.java'
      - 'src/main/java/neqsim/process/lng/LNGProcessModel.java'
      - 'src/test/java/neqsim/process/lng/LNGProcessBuilderTest.java'
      - '.github/workflows/lng-source-formatting.yml'

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Apply repository formatter
        run: ./mvnw -q spotless:apply
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-lng-sources
          path: |
            src/main/java/neqsim/process/lng/LNGProcessBuilder.java
            src/main/java/neqsim/process/lng/LNGProcessModel.java
            src/test/java/neqsim/process/lng/LNGProcessBuilderTest.java
