name: Publish package to the Maven Central Repository
permissions:
  contents: read
on:
  workflow_dispatch:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Determine release version
        id: release_version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          cache: 'maven'
      # Clean Maven cache for critical dependencies to avoid stale class issues
      - name: Clean dependency cache for EJML
        run: |
          rm -rf ~/.m2/repository/org/ejml
          echo "Cleaned EJML from Maven cache to ensure fresh download"
      # --- Java 8 artifact ---
      - name: Publish package (Java 8)
        run: ./mvnw -f pomJava8.xml -P release --batch-mode clean deploy -DskipTests -Djacoco.skip=true -Drevision=${{ steps.release_version.outputs.version }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
      # --- Java 11 artifact ---
      - name: Publish package
        run: ./mvnw -P release --batch-mode clean deploy -DskipTests -Djacoco.skip=true -Drevision=${{ steps.release_version.outputs.version }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}

