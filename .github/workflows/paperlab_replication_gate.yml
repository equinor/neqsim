name: PaperLab Replication Gate

# Replication gate for PaperLab papers and books.
#
# Runs on PRs that touch papers/<slug>/** or books/<slug>/**. Performs:
#   1. Clean checkout into a fresh workspace
#   2. Build NeqSim
#   3. Replay every benchmark / experiment referenced in plan.json
#   4. Compare reproduced results against the committed results.json
#      within the tolerances declared in claims_manifest.json
#   5. Block merge if any reproduced number falls outside tolerance
#
# This gate is what separates "we ran a notebook once" from
# "every reviewer can rerun this paper from scratch".

on:
  pull_request:
    paths:
      - "neqsim-paperlab/papers/**"
      - "neqsim-paperlab/books/**"
      - "src/main/java/neqsim/**"
      - ".github/workflows/paperlab_replication_gate.yml"

  workflow_dispatch:
    inputs:
      paper_slug:
        description: "Paper or book slug (under neqsim-paperlab/papers or /books)"
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changed-papers:
    name: Detect changed papers / books
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.set-slugs.outputs.slugs }}
      any: ${{ steps.set-slugs.outputs.any }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine changed paper / book slugs
        id: set-slugs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slugs=[\"${{ inputs.paper_slug }}\"]" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" \
            | grep -E "^neqsim-paperlab/(papers|books)/[^/]+/" \
            | awk -F/ '{print $2"/"$3}' \
            | sort -u)
          if [ -z "$changed" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "slugs=[]" >> "$GITHUB_OUTPUT"
          else
            slugs_json=$(echo "$changed" | jq -R -s -c 'split("\n") | map(select(length>0))')
            echo "slugs=$slugs_json" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

  replicate:
    name: Replicate ${{ matrix.slug }}
    needs: detect-changed-papers
    if: needs.detect-changed-papers.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJSON(needs.detect-changed-papers.outputs.slugs) }}
    steps:
      - name: Checkout (clean)
        uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache Maven
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('pom.xml') }}

      - name: Build NeqSim
        run: ./mvnw -B -DskipTests -Dmaven.javadoc.skip=true package

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install scipy numpy pandas matplotlib pyyaml \
                                jpype1 statsmodels

      - name: Resolve paper directory
        id: paths
        run: |
          slug="${{ matrix.slug }}"
          artifact_name="replication-$(printf '%s' "$slug" | sed 's#["*:<>?|\\/]#-#g')"
          if [ -d "neqsim-paperlab/$slug" ]; then
            echo "dir=neqsim-paperlab/$slug" >> "$GITHUB_OUTPUT"
            echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          else
            echo "Paper/book directory not found for slug $slug" >&2
            exit 1
          fi

      - name: Verify required artefacts
        run: |
          dir="${{ steps.paths.outputs.dir }}"
          for f in plan.json results.json claims_manifest.json; do
            if [ ! -f "$dir/$f" ]; then
              echo "MISSING: $dir/$f" >&2
              exit 1
            fi
          done

      - name: Replicate experiments
        id: replay
        env:
          PAPER_DIR: ${{ steps.paths.outputs.dir }}
        run: |
          python neqsim-paperlab/tools/replicate.py \
            --paper-dir "$PAPER_DIR" \
            --output    "$PAPER_DIR/replication_report.json"

      - name: Check tolerances
        run: |
          python neqsim-paperlab/tools/check_replication.py \
            --paper-dir "${{ steps.paths.outputs.dir }}" \
            --report    "${{ steps.paths.outputs.dir }}/replication_report.json"

      - name: Upload replication report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.paths.outputs.artifact_name }}
          path: ${{ steps.paths.outputs.dir }}/replication_report.json

      - name: Comment on PR (failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const slug = "${{ matrix.slug }}";
            const artifactName = "${{ steps.paths.outputs.artifact_name }}";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## :no_entry: Replication gate failed for \`${slug}\`\n\n` +
                    `One or more reproduced results fell outside the tolerance ` +
                    `declared in \`claims_manifest.json\`.\n\n` +
                    `See the **replicate** job logs and the uploaded ` +
                    `\`${artifactName}\` artefact for the full report.\n\n` +
                    `Fix options:\n` +
                    `- Re-run the experiments locally and commit the new ` +
                    `\`results.json\`\n` +
                    `- Loosen the tolerance in \`claims_manifest.json\` ` +
                    `(must be justified in the response letter)\n` +
                    `- Pin the NeqSim git commit in \`plan.json\` if the ` +
                    `change is upstream`
            });

  no-papers-changed:
    name: No papers / books changed
    needs: detect-changed-papers
    if: needs.detect-changed-papers.outputs.any == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No paperlab papers or books touched in this PR — skipping replication."
