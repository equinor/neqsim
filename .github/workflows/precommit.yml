name: Pre-commit checks

# Check-only gate: CI verifies formatting but never writes to the repository.
# Auto-formatting is the contributor's responsibility via local pre-commit hooks
# (`pre-commit install` — see CONTRIBUTING.md). This keeps CI compatible with
# branch protection and avoids pushing commits from Actions.
permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  check:
    name: Run pre-commit checks (PR)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/pre-commit
            ~/.m2/repository/dev/equo/p2-data
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml', 'pom.xml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-
      - name: Install pre-commit
        run: python -m pip install pre-commit
      - name: Run pre-commit checks
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if pre-commit run --all-files --hook-stage pre-push 2>&1 | tee pre-commit.log; then
              exit 0
            fi
            status=${PIPESTATUS[0]}
            if ! grep -q "Failed to provision P2 dependencies" pre-commit.log || [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            rm -rf ~/.m2/repository/dev/equo/p2-data
            echo "Spotless P2 provisioning failed on attempt $attempt; retrying..."
            sleep $((attempt * 20))
          done
