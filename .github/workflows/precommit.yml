name: Pre-commit checks

# Check-only gate: CI verifies formatting but never writes to the repository.
# Auto-formatting is the contributor's responsibility via local pre-commit hooks
# (`pre-commit install` — see CONTRIBUTING.md). This keeps CI compatible with
# branch protection and avoids pushing commits from Actions.
permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  check:
    name: Run pre-commit checks (PR)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --hook-stage pre-push
