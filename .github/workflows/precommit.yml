name: Pre-commit checks

permissions:
  contents: write

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  check:
    name: Run pre-commit checks (PR)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --hook-stage pre-push

  autoformat:
    name: Auto-format branch
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run auto-format hooks
        run: pre-commit run --all-files --hook-stage pre-commit

      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(format): auto-format code with pre-commit"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git push origin HEAD:${{ github.head_ref }}
          else
            git push
          fi
