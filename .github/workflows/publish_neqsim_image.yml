name: Publish NeqSim Image

# Builds the self-contained NeqSim image (root Dockerfile) — Java 21 + Maven +
# Python with the NeqSim source already compiled and usable from both Java and
# Python (jpype) — and pushes it to the GitHub Container Registry.
#
# Consume it (no local build, no Java install needed):
#   docker pull ghcr.io/equinor/neqsim:latest
#   docker run -it ghcr.io/equinor/neqsim:latest bash
#   # Java:   ./mvnw -o test -Dtest=SystemSrkEosTest
#   # Python: python3  (then: from neqsim_dev_setup import neqsim_init, ...)
#
# This is distinct from devcontainer_prebuild.yml, which publishes the
# *toolchain-only* dev container (ghcr.io/equinor/neqsim-devcontainer) used as
# the base image here.

permissions:
  contents: read
  packages: write

on:
  release:
    types: [published]

env:
  IMAGE: ghcr.io/equinor/neqsim

jobs:
  build_and_push:
    name: Build & push self-contained NeqSim image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
