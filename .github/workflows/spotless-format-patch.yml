name: Spotless format patch

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Apply repository formatter
        run: mvn -B -ntp -DskipTests spotless:apply
      - name: Create formatting patch
        run: git diff --binary > /tmp/spotless.patch
      - uses: actions/upload-artifact@v4
        with:
          name: spotless-format-patch
          path: /tmp/spotless.patch
          if-no-files-found: error
