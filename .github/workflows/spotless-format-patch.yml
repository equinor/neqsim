name: Temporary Spotless format patch

permissions:
  contents: read

on:
  pull_request:
    branches:
      - master

jobs:
  patch:
    name: Generate Spotless patch artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: ~/.m2/repository/dev/equo/p2-data
          key: spotless-format-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-
      - name: Apply Spotless
        run: ./mvnw -q spotless:apply
      - name: Create formatting patch
        run: git diff --binary -- src/main/java src/test/java > spotless.patch
      - uses: actions/upload-artifact@v7
        with:
          name: spotless-format-patch
          path: spotless.patch
          if-no-files-found: error
