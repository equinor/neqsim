name: Spotless format patch

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B -ntp -DskipTests spotless:apply
      - run: git diff --binary > /tmp/spotless.patch
      - uses: actions/upload-artifact@v7
        with:
          name: spotless-format-patch
          path: /tmp/spotless.patch
