name: Auto-open NIP issues

permissions:
  contents: read
  issues: write

on:
  push:
    branches:
      - master
    paths:
      - "task_solve/**/neqsim_improvements.md"

jobs:
  open-issues:
    name: Open issues for new neqsim_improvements.md files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect newly added NIP files
        id: detect
        shell: bash
        run: |
          set -e
          # Compare against the previous commit on master
          prev="${{ github.event.before }}"
          head="${{ github.sha }}"
          if [ -z "$prev" ] || [ "$prev" = "0000000000000000000000000000000000000000" ]; then
            # First push or shallow — fall back to HEAD~1
            prev=$(git rev-parse HEAD~1 || echo "")
          fi
          if [ -z "$prev" ]; then
            echo "No previous commit available — skipping."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Only files added (status A) under task_solve/**/neqsim_improvements.md
          added=$(git diff --name-only --diff-filter=A "$prev" "$head" -- \
            'task_solve/**/neqsim_improvements.md' || true)
          echo "Newly added NIP files:"
          echo "$added"
          {
            echo "files<<EOF"
            echo "$added"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open one GitHub issue per new NIP file
        if: steps.detect.outputs.files != ''
        uses: actions/github-script@v9
        env:
          NIP_FILES: ${{ steps.detect.outputs.files }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const files = (process.env.NIP_FILES || '').split('\n').map(s => s.trim()).filter(Boolean);
            if (files.length === 0) {
              core.info('No NIP files to process.');
              return;
            }
            const sha = context.sha.substring(0, 7);
            for (const f of files) {
              if (!fs.existsSync(f)) {
                core.warning(`File not found in checkout: ${f}`);
                continue;
              }
              // Derive task slug from path: task_solve/<slug>/...
              const parts = f.split('/');
              const slug = parts.length >= 2 ? parts[1] : 'unknown-task';

              const raw = fs.readFileSync(f, 'utf8');
              // Truncate body to keep issues readable; link to the source file for full content
              const maxLen = 60000;
              const truncated = raw.length > maxLen
                ? raw.slice(0, maxLen) + `\n\n…(truncated; see source file for full content)…\n`
                : raw;

              const repo = `${context.repo.owner}/${context.repo.repo}`;
              const sourceUrl = `https://github.com/${repo}/blob/${context.sha}/${f}`;

              const title = `[NIP] ${slug}`;
              const body = [
                `Auto-generated from a new \`neqsim_improvements.md\` discovered in commit \`${sha}\`.`,
                ``,
                `**Task folder:** \`${path.dirname(f)}\``,
                `**Source file:** [${f}](${sourceUrl})`,
                ``,
                `---`,
                ``,
                truncated,
              ].join('\n');

              // Avoid duplicates: search for an existing open issue with same title and label
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${repo} is:issue is:open in:title "${title}" label:nip`,
              });
              if (search.data.total_count > 0) {
                core.info(`Issue already open for ${title} — skipping.`);
                continue;
              }

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['nip', 'enhancement'],
              });
              core.info(`Opened issue #${created.data.number} for ${f}`);
            }

      - name: No-op note
        if: steps.detect.outputs.files == ''
        run: echo "No newly added neqsim_improvements.md files in this push."
