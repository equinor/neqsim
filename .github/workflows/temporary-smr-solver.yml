name: Temporary SMR solver diagnostic

permissions:
  contents: read

on:
  push:
    branches:
      - fix-multistream-restart-sequence

concurrency:
  group: temporary-smr-solver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smr:
    name: Run repeated SMR solver test on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Set up Java 21 environment
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run only the repeated SMR regression
        run: mvn -B test -ntp -Dtest=LNGProcessBuilderTest#testSmrRouteRunsAndReportsPerformance -DexcludedTestGroups= -Djacoco.skip=true "-Daether.connector.basic.retries=5"
