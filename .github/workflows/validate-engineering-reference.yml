name: Validate engineering reference fixture

on:
  pull_request:
    paths:
      - "src/main/java/neqsim/process/equipment/pipeline/AdiabaticPipe.java"
      - "src/main/java/neqsim/process/engineering/**"
      - "src/test/java/neqsim/process/equipment/pipeline/AdiabaticPipeTest.java"
      - "src/test/java/neqsim/process/engineering/QualifiedEngineeringReferenceFacilityTest.java"
      - ".github/workflows/validate-engineering-reference.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Apply repository Java formatting
        run: ./mvnw spotless:apply
      - name: Run targeted reference-facility acceptance tests
        run: ./mvnw -Dtest=QualifiedEngineeringReferenceFacilityTest test
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: engineering-reference-test-reports
          path: |
            target/surefire-reports/
            src/main/java/neqsim/process/equipment/pipeline/AdiabaticPipe.java
            src/main/java/neqsim/process/engineering/design/modules/CompressorOperatingEnvelopeDesignModule.java
            src/main/java/neqsim/process/engineering/deliverables/EngineeringDeliverableCompiler.java
            src/main/java/neqsim/process/engineering/dexpi/EngineeringDexpiRoundTripQualifier.java
            src/main/java/neqsim/process/engineering/verticalslice/InletCompressionExportReferenceFacility.java
            src/main/java/neqsim/process/engineering/verticalslice/ProductionVerticalSliceExecutionManifest.java
            src/main/java/neqsim/process/engineering/verticalslice/ProductionVerticalSlicePreflight.java
            src/test/java/neqsim/process/equipment/pipeline/AdiabaticPipeTest.java
            src/test/java/neqsim/process/engineering/QualifiedEngineeringReferenceFacilityTest.java
            src/test/java/neqsim/process/engineering/EngineeringVerticalSliceProductionTest.java
          if-no-files-found: ignore
