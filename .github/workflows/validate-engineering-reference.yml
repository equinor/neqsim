name: Validate engineering reference fixture

on:
  pull_request:
    paths:
      - "src/main/java/neqsim/process/engineering/**"
      - "src/test/java/neqsim/process/engineering/QualifiedEngineeringReferenceFacilityTest.java"
      - ".github/workflows/validate-engineering-reference.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run targeted reference-facility acceptance tests
        run: ./mvnw -Dtest=QualifiedEngineeringReferenceFacilityTest test
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: engineering-reference-test-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
