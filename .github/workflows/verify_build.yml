name: Run build, test and javadoc
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: # Only run for changes in master branch and any releases branch
      - master
      - 'releases/**'
  pull_request:
    branches:
      - master

jobs:
  test_javadoc:
    name: Assert javadoc with Java 21 on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 1
      - name: Set up Java 21 environment
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Generate javadoc
        run: mvn javadoc:javadoc -ntp "-Daether.connector.basic.retries=5"

  test_java_matrix:
    name: Assert tests with Java 21 on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: test_javadoc
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: Ubuntu
            os: ubuntu-latest
            verify_jacoco: true
          - platform: Windows
            os: windows-latest
            verify_jacoco: false
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 1
      - name: Set up Java 21 environment
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Run tests and generate JaCoCo report
        if: matrix.verify_jacoco
        run: mvn -B test -ntp -DexcludedTestGroups= "-Daether.connector.basic.retries=5"
      - name: Run fast tests, do not generate JaCoCo report
        if: ${{ !matrix.verify_jacoco }}
        run: mvn -B test -ntp -DskipITs "-Daether.connector.basic.retries=5" -Djacoco.skip=true
      - name: Verify JaCoCo report exists
        if: matrix.verify_jacoco && github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            echo "JaCoCo report found"
            head -20 target/site/jacoco/jacoco.xml
          else
            echo "ERROR: JaCoCo report not found!"
            echo "Checking for jacoco.exec..."
            ls -la target/ | grep -i jacoco || echo "No jacoco files in target/"
            echo "Checking target/site/jacoco/..."
            ls -la target/site/jacoco/ 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi
      - name: Upload jacoco coverage reports to Codecov
        if: matrix.verify_jacoco && github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: codecov/codecov-action@v7
        with:
          files: target/site/jacoco/jacoco.xml
          name: codecov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test_java_8:
    name: Assert tests with Java 8 on Ubuntu
    runs-on: ubuntu-latest
    needs: test_java_matrix
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 1
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '8'
          cache: 'maven'
      - name: Run tests
        run: mvn -B test --file pomJava8.xml -ntp "-Daether.connector.basic.retries=5" -Djacoco.skip=true

  test_java_8_windows:
    name: Assert tests with Java 8 on Windows
    runs-on: windows-latest
    needs: test_java_matrix
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 1
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '8'
          cache: 'maven'
      - name: Run tests
        run: mvn -B test --file pomJava8.xml -ntp "-Daether.connector.basic.retries=5" -Djacoco.skip=true

  verify_agent_skills:
    name: Verify agent-skill cross-references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Check agent-skill references
        run: python devtools/verify_agent_skill_refs.py
