# NeqSim Community Skill Catalog
#
# Machine-readable listing of community-contributed skills hosted outside
# the core repo. Install with: neqsim skill install <name>
#
# To add your skill: submit a PR adding an entry to this file.
# See VISION_AGENTS.md for core vs. community guidelines.
#
# Format:
#   - name: neqsim-<topic>           # must start with neqsim-
#     version: "1.0.0"              # optional: skill version
#     description: "Short description"
#     author: "GitHub username or name"
#     repo: "owner/repo"              # GitHub repo containing the skill
#     path: "path/to/SKILL.md"        # path within the repo (default: SKILL.md)
#     tags: [tag1, tag2]              # searchable keywords
#     min_neqsim_version: "3.7.0"    # optional: minimum NeqSim version
#
# Multi-skill GitHub repositories can be discovered online:
#   - repo: "owner/repo"
#     catalog_path: "community-skills.yaml"  # optional, default shown
#     skill_path_glob: "skills/**/SKILL.md"  # fallback when no catalog is found

catalog_version: "1.0"
last_updated: "2026-05-31"
trust: community

repositories:
  # Discover all public community skills from the external community repo.
  - repo: "equinor/neqsim-community-skills"
    catalog_path: "community-skills.yaml"
    skill_path_glob: "skills/**/SKILL.md"
    author: "neqsim-community"
    trust_level: community
    tags: [community]
    min_neqsim_version: "3.7.0"

skills:
  # ── Add direct community-skill entries below this line when they should be
  # ── discoverable from the root NeqSim catalog without using the repository
  # ── discovery entry above. Do not add template/example skills here.
  # - name: neqsim-my-topic
  #   description: "What it does and when to use it"
  #   author: "your-github-username"
  #   repo: "your-username/your-repo"
  #   path: "skills/neqsim-my-topic/SKILL.md"
  #   tags: [keyword1, keyword2]
