# NeqSim MCP Server Configuration

# Server identity (uses Maven artifact name and version automatically)
quarkus.application.name=neqsim
quarkus.application.version=1.0.0

# Package as uber-jar for single-file distribution
quarkus.package.jar.type=uber-jar

# Logging: STDIO transport redirects logs to stderr automatically.
# Keep logging quiet to avoid noise in the STDIO stream.
quarkus.log.level=WARN
quarkus.log.category."neqsim".level=WARN
quarkus.log.category."io.quarkiverse.mcp".level=INFO
