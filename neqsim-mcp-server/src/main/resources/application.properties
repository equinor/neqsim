# NeqSim MCP Server Configuration

# Server identity (uses Maven artifact name and version automatically)
quarkus.application.name=neqsim
quarkus.application.version=1.0.0

# Package as uber-jar for single-file distribution
quarkus.package.jar.type=uber-jar

# Logging: STDIO transport redirects logs to stderr automatically.
# Keep logging quiet to avoid noise in the STDIO stream.
quarkus.log.level=WARN
quarkus.log.category."neqsim".level=WARN
quarkus.log.category."io.quarkiverse.mcp".level=INFO

# NeqSim exposes more than the Quarkiverse default page size of 50 tools.
# Disable pagination so MCP clients that do not request nextCursor still see the full catalog.
quarkus.mcp.server.tools.page-size=0
quarkus.mcp.server.resources.page-size=0
quarkus.mcp.server.resource-templates.page-size=0
quarkus.mcp.server.prompts.page-size=0

# ─── Streamable HTTP Transport Configuration ───────────────────────────────
# The HTTP transport enables team sharing and multi-server composition.
# Both STDIO and Streamable HTTP transports are active simultaneously.
#
# Quarkiverse MCP Server exposes Streamable HTTP at /mcp by default and the
# legacy HTTP/SSE endpoint at /mcp/sse for older clients.
#
# Default: listen on localhost:8080 (safe for single-user development).
# Override with quarkus.http.host=0.0.0.0 for team deployment.
quarkus.http.port=8080
quarkus.http.host=localhost

# CORS — allow browser-based dashboards and multi-server MCP clients.
# In production, restrict quarkus.http.cors.origins to specific domains.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173

# ─── OpenTelemetry Tracing (governance / observability) ────────────────────
# Distributed tracing of MCP HTTP tool invocations for the DIGITAL_TWIN and
# ENTERPRISE deployment profiles. Spans can be exported to any OTLP collector
# (Jaeger, Tempo, Honeycomb, Azure Monitor, ...).
#
# Disabled by default so STDIO / desktop usage has zero overhead and contacts
# no external collector. To enable, point at a collector and turn the SDK on:
#   quarkus.otel.sdk.disabled=false
#   quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
quarkus.otel.sdk.disabled=true
quarkus.otel.service.name=neqsim-mcp-server
# Activate tracing automatically in the enterprise profile (run with
# -Dquarkus.profile=enterprise or QUARKUS_PROFILE=enterprise).
%enterprise.quarkus.otel.sdk.disabled=false
%enterprise.quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317

# ─── OIDC Authorization (ENTERPRISE profile) ───────────────────────────────
# Bearer-token authentication for the HTTP transport, backing the ENTERPRISE
# deployment profile's governance gates (audit, approval, least-privilege).
# STDIO and single-user HTTP remain unauthenticated.
#
# Disabled by default (tenant-enabled=false) so the server starts with no
# identity provider. To enable, point at your IdP and turn the tenant on:
#   quarkus.oidc.tenant-enabled=true
#   quarkus.oidc.auth-server-url=https://login.microsoftonline.com/<tenant-id>/v2.0
#   quarkus.oidc.client-id=<client-id>
quarkus.oidc.tenant-enabled=false
quarkus.oidc.application-type=service
# In the enterprise profile, require an authenticated principal for the MCP
# HTTP endpoints. Supply auth-server-url and client-id via environment/secret.
%enterprise.quarkus.oidc.tenant-enabled=true
%enterprise.quarkus.http.auth.permission.mcp.paths=/mcp,/mcp/*
%enterprise.quarkus.http.auth.permission.mcp.policy=authenticated
