# NeqSim MCP Server Configuration

# Server identity (uses Maven artifact name and version automatically)
quarkus.application.name=neqsim
quarkus.application.version=1.0.0

# Package as uber-jar for single-file distribution
quarkus.package.jar.type=uber-jar

# Logging: STDIO transport redirects logs to stderr automatically.
# Keep logging quiet to avoid noise in the STDIO stream.
quarkus.log.level=WARN
quarkus.log.category."neqsim".level=WARN
quarkus.log.category."io.quarkiverse.mcp".level=INFO

# NeqSim exposes more than the Quarkiverse default page size of 50 tools.
# Disable pagination so MCP clients that do not request nextCursor still see the full catalog.
quarkus.mcp.server.tools.page-size=0
quarkus.mcp.server.resources.page-size=0
quarkus.mcp.server.resource-templates.page-size=0
quarkus.mcp.server.prompts.page-size=0

# ─── Streamable HTTP Transport Configuration ───────────────────────────────
# The HTTP transport enables team sharing and multi-server composition.
# Both STDIO and Streamable HTTP transports are active simultaneously.
#
# Quarkiverse MCP Server exposes Streamable HTTP at /mcp by default and the
# legacy HTTP/SSE endpoint at /mcp/sse for older clients.
#
# Default: listen on localhost:8080 (safe for single-user development).
# Override with quarkus.http.host=0.0.0.0 for team deployment.
quarkus.http.port=8080
quarkus.http.host=localhost

# CORS — allow browser-based dashboards and multi-server MCP clients.
# In production, restrict quarkus.http.cors.origins to specific domains.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
