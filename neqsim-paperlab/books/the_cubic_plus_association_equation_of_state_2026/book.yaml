title: "The Cubic Plus Association Equation of State (CPA-EoS)"
subtitle: "From Fundamentals to Industrial Applications"
authors:
  - name: "Even Solbraa"
    affiliation: "Equinor ASA / NeqSim Project"
    email: "even.solbraa@gmail.com"
edition: "1st"
year: 2026
publisher: "springer"
language: "en"
isbn: ""

