# Industrial & Engineering Chemistry Research — Journal Profile
# ACS Publications — ISSN: 0888-5885
# https://pubs.acs.org/journal/iecred

journal_name: "Industrial & Engineering Chemistry Research"
journal_abbrev: "Ind. Eng. Chem. Res."
publisher: "American Chemical Society (ACS)"
issn: "0888-5885"
eissn: "1520-5045"
url: "https://pubs.acs.org/journal/iecred"
submit_url: "https://publish.acs.org/"
impact_factor: 3.9
citescore: 6.7
scope: >
  Experimental, computational, and theoretical research on applied chemistry,
  chemical engineering, and biomolecular engineering. Covers reaction engineering,
  separations, thermodynamics, transport phenomena, process design, catalysis,
  materials, and environmental engineering.

# Structure
abstract_words_max: 250
keywords_min: null  # ACS uses "Topics" system, not author-supplied keywords
keywords_max: null
section_order:
  - Abstract
  - TOC Graphic
  - Introduction
  - Theory / Methods
  - Results and Discussion
  - Conclusions
  - Associated Content (Supporting Information)
  - Author Information (Corresponding Author, Authors, Author Contributions, Notes)
  - Acknowledgements
  - References

# Formatting
latex_class: "achemso"
latex_options: null  # achemso auto-detects journal from \journal{} command
reference_style: "achemso"
citation_style: "numbered_superscript"  # Superscript numbers: ¹, ², ³⁻⁵
figure_formats:
  - "tiff"
  - "eps"
  - "pdf"
  - "png"
  - "jpeg"
figure_dpi_min: 300
figure_width_single_column_in: 3.25
figure_width_double_column_in: 7.0
table_style: "acs_standard"  # ACS uses standard table formatting
equation_numbering: "sequential"
line_numbering_required: false  # Not required by ACS
double_spacing_required: true
page_size: "US_Letter"  # 8.5 x 11 inches (NOT A4)

# Requirements
toc_graphic_required: true  # Table of Contents graphic is MANDATORY
toc_graphic_size: "3.25 x 1.75 inches"
highlights_required: false
graphical_abstract_required: false  # TOC graphic serves this purpose
cover_letter_required: false  # Not explicitly required
conflict_of_interest_required: true
data_availability_required: false  # Recommended via Supporting Information
credit_statement_required: false  # Author contributions in Author Information section
orcid_required: true  # Required for corresponding author
supporting_information_encouraged: true

# Page/Content Limits
pages_max: null  # No strict limit for Articles
figures_max: null
tables_max: null
references_max: null
word_count_typical: "6000-10000"

# Submission Types
paper_types:
  - "Article"
  - "Review"
  - "Perspective"
  - "Correspondence/Rebuttal"

# Peer Review
peer_review_model: "single_anonymous"  # Reviewers anonymous, authors known

# Reference Format Examples
# Superscript numbered, in order of appearance
# Journal: Author1, A. B.; Author2, C. D. Title. J. Abbrev. Year, Vol, Pages.
# Example: Peng, D.-Y.; Robinson, D. B. A New Two-Constant Equation of State.
#          Ind. Eng. Chem. Fundam. 1976, 15, 59-64.
# Book: Author, A. B. Title of Book; Publisher: City, Year.
# All authors listed (no "et al." in reference list)

# Typical Topics for Flash Algorithm / Thermo Papers
relevant_topics:
  - "Thermodynamics and molecular modeling"
  - "Phase equilibria and equation of state"
  - "Process design and simulation"
  - "Separations and purification"
  - "Reaction engineering and catalysis"
  - "Computational methods in chemical engineering"
  - "Transport phenomena"

# Key ACS Policies
policies:
  ai_disclosure: "Must disclose AI use; AI cannot be listed as author"
  preprints: "Allowed on recognized preprint servers (e.g. ChemRxiv)"
  data_sharing: "Encouraged via Supporting Information or data repositories"
  color_figures: "Free for online; charges may apply for print color"
  open_access_apc: "Varies by agreement; check ACS Read & Publish deals"
  ithenticate_screening: "Manuscripts screened for similarity via CrossCheck"
