# International Journal of Greenhouse Gas Control — Journal Profile
# Elsevier — ISSN: 1750-5836
# https://www.sciencedirect.com/journal/international-journal-of-greenhouse-gas-control

journal_name: "International Journal of Greenhouse Gas Control"
journal_abbrev: "Int. J. Greenh. Gas Control"
publisher: "Elsevier"
issn: "1750-5836"
eissn: "1878-0148"
url: "https://www.sciencedirect.com/journal/international-journal-of-greenhouse-gas-control"
submit_url: "https://www.editorialmanager.com/jggc/"
impact_factor: 3.4
citescore: 6.4
scope: >
  Technologies, processes, and systems for mitigating greenhouse gas emissions,
  with a primary focus on CO2 capture, transport, and geological storage (CCS).
  Covers capture processes, CO2 phase behavior, pipeline design, well integrity,
  monitoring and verification, risk assessment, and lifecycle analysis of CCS
  chains. Also includes hydrogen production with CCS (blue hydrogen) and
  negative emission technologies (BECCS, DACCS).

# Structure
abstract_words_max: 250
keywords_min: 3
keywords_max: 6
section_order:
  - Abstract
  - Keywords
  - Highlights
  - Introduction
  - Materials and Methods / Theory
  - Results and Discussion
  - Conclusions
  - Nomenclature
  - Acknowledgements
  - CRediT Author Contributions
  - Declaration of Competing Interest
  - Declaration of Generative AI Use
  - Data Availability
  - References
  - Appendices

# Formatting
latex_class: "elsarticle"
latex_options: "review,3p"
reference_style: "elsarticle-num"
citation_style: "numbered"  # [1], [2], [3-5]
figure_formats:
  - "pdf"
  - "eps"
  - "tif"
  - "png"
  - "jpeg"
figure_dpi_min: 300
figure_dpi_line_art: 1000
table_style: "three-line"
equation_numbering: "sequential"
line_numbering_required: true
double_spacing_required: true

# Requirements
highlights_required: true
highlights_max: 5
highlights_min: 3
highlights_max_chars_each: 85
graphical_abstract_required: false  # Encouraged but optional
cover_letter_required: true
conflict_of_interest_required: true
data_availability_required: true
credit_statement_required: true
ai_disclosure_required: true
nomenclature_section: "recommended"

# Page/Content Limits
pages_max: null
figures_max: null
tables_max: null
references_max: null
word_count_typical: "6000-10000"

# Submission Types
paper_types:
  - "Research Article"
  - "Short Communication"
  - "Review Article"
  - "Perspective"
  - "Technical Note"

# Peer Review
peer_review_model: "single_anonymous"

# Typical Topics for NeqSim CCS Papers
relevant_topics:
  - "CO2 phase behavior with impurities (N2, H2, O2, Ar, H2S, SO2)"
  - "Dense phase CO2 pipeline design and transport"
  - "CO2 injection well integrity and thermal analysis"
  - "Impurity enrichment during CO2 transport and injection"
  - "Shutdown and restart transient analysis for CO2 pipelines"
  - "Phase envelope mapping for CO2 mixtures"
  - "Equation of state modeling for CCS-relevant systems"
  - "Hydrate formation in CO2-rich streams"
  - "Corrosion prediction in CO2 transport"
  - "Blue hydrogen production (SMR/ATR with CCS)"
  - "CCS chain optimization and techno-economic assessment"

# Distinctive Features
distinctive_features:
  - "Premier venue for CCS research — high relevance as CCS scales up"
  - "Strong on both experimental and modeling work"
  - "Well-established GHGT conference paper upgrade pathway"
  - "Accepts techno-economic analysis and lifecycle assessment"
  - "Multi-disciplinary: subsurface + process + materials + risk"

# Key Policies
policies:
  ai_disclosure: "Must declare generative AI use in a new dedicated section"
  preprints: "Allowed on recognized preprint servers"
  data_sharing: "Research data should be deposited in a repository"
  open_access: "Hybrid journal — OA option available"

# Reviewer Expertise
reviewer_expertise:
  - "CO2 capture process modeling"
  - "CO2 transport and pipeline design"
  - "Geological storage and well integrity"
  - "Thermodynamic modeling of CO2 mixtures"
  - "CCS risk assessment and safety"
  - "Hydrogen production and blue hydrogen"
