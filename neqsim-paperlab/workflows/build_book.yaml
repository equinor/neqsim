# Book Build Workflow
# Full pipeline: compile → run notebooks → update chapters → check quality → render
#
# Usage (one-step):
#   python paperflow.py book-build <book_dir>
#   python paperflow.py book-build <book_dir> --format all
#   python paperflow.py book-build <book_dir> --format docx --stop-on-error
#
# Usage (step-by-step):
#   python paperflow.py book-run-notebooks <book_dir>
#   python paperflow.py book-check <book_dir>
#   python paperflow.py book-render <book_dir> --format html

workflow_name: "build_book"
version: "1.0"
description: "Build a complete book from source: compile NeqSim, run notebooks, update chapters, check quality, render"

prerequisites:
  - "Java 8+ installed"
  - "Python 3.8+ with nbconvert, nbformat, matplotlib, numpy"
  - "JPype1 installed (pip install jpype1)"
  - "neqsim compiled: mvnw.cmd compile (runs automatically unless --no-compile)"

stages:

  # ------------------------------------------------------------------
  # Stage 1: Compile
  # ------------------------------------------------------------------
  - name: "compile"
    description: "Compile NeqSim Java sources so notebooks can use devtools JVM bootstrap"
    command: "mvnw.cmd compile -q"
    notes: >
      Uses devtools/neqsim_dev_setup.py to start JVM from target/classes.
      No JAR packaging (mvnw package) is needed — saves ~30s.
    skippable: true
    skip_flag: "--no-compile"

  # ------------------------------------------------------------------
  # Stage 2: Run Notebooks
  # ------------------------------------------------------------------
  - name: "run_notebooks"
    description: "Execute all Jupyter notebooks in chapter directories"
    command: "python paperflow.py book-run-notebooks <book_dir>"
    notes: >
      Each notebook runs in its own subprocess with a fresh JVM via
      neqsim_dev_setup. The dual-boot setup cell in each notebook
      automatically detects devtools mode (no pip neqsim required).

      Notebooks generate:
      - PNG figures in chapters/chNN/figures/
      - Computation results in cell outputs
      - Exercise solutions
    options:
      - "--chapter ch04_association_theory   # run single chapter"
      - "--timeout 900                        # increase timeout"
      - "--stop-on-error                      # halt on first failure"
    skippable: true
    skip_flag: "--skip-notebooks"

  # ------------------------------------------------------------------
  # Stage 3: Update Chapters
  # ------------------------------------------------------------------
  - name: "update_chapters"
    description: "Inject generated figure references into chapter.md files"
    notes: >
      Scans each chapter's figures/ directory for PNGs generated by
      notebooks. Any figure not already referenced in chapter.md is
      appended with a captioned image reference.
    automatic: true

  # ------------------------------------------------------------------
  # Stage 4: Quality Checks
  # ------------------------------------------------------------------
  - name: "quality_checks"
    description: "Run structure, completeness, and consistency checks"
    command: "python paperflow.py book-check <book_dir>"
    checks:
      - "structure: all chapters in book.yaml exist on disk"
      - "completeness: word counts, TODO markers"
      - "references: bibliography entries cited in text"
      - "figures: all referenced figures exist"
      - "nomenclature: symbols defined and consistent"
    automatic: true

  # ------------------------------------------------------------------
  # Stage 5: Render
  # ------------------------------------------------------------------
  - name: "render"
    description: "Assemble and render the final book"
    command: "python paperflow.py book-render <book_dir> --format html"
    formats:
      - html: "Standalone HTML with KaTeX math, navigation sidebar"
      - docx: "Word document with auto-updating TOC, styled headings"
      - pdf: "PDF via LaTeX (requires LaTeX installation)"
      - all: "All formats at once"
    options:
      - "--format html    # single format"
      - "--format all     # all formats"
      - "--chapter ch05   # single chapter preview"

# ------------------------------------------------------------------
# Quick Reference
# ------------------------------------------------------------------
quick_reference:
  one_step_build: "python paperflow.py book-build books/my_book --format all"
  run_notebooks_only: "python paperflow.py book-run-notebooks books/my_book"
  render_only: "python paperflow.py book-build books/my_book --skip-notebooks --format html"
  single_chapter: "python paperflow.py book-run-notebooks books/my_book --chapter ch04_association_theory"
  check_status: "python paperflow.py book-status books/my_book"
  direct_tool: "python tools/book_notebook_runner.py books/my_book --build --format all"
